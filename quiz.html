<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language Quiz</title>

<style>
body {
    font-family: Arial;
    background: #f0f4f8;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.quiz-container {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 420px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.prompt {
    font-size: 20px;
    font-weight: bold;
    color: #1cb0f6;
    margin: 15px 0;
}

.slots-container, .words-container {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin: 15px 0;
    flex-wrap: wrap;
}

.slot {
    width: 80px;
    height: 45px;
    border: 2px dashed #ccc;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 8px;
}

.slot.drag-over {
    border-color: #1cb0f6;
    background: #e8f6ff;
}

.word {
    padding: 8px 12px;
    background: white;
    border: 1px solid #ddd;
    border-bottom: 3px solid #ccc;
    border-radius: 8px;
    cursor: grab;
    font-weight: bold;
}

.word.dragging {
    opacity: 0.4;
}

button {
    padding: 10px;
    margin-top: 10px;
    width: 100%;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.check-btn {
    background: #58cc02;
    color: white;
}

.next-btn {
    background: #1cb0f6;
    color: white;
    display: none;
}

.feedback {
    margin-top: 10px;
    font-weight: bold;
}
.correct { color: green; }
.incorrect { color: red; }

</style>
</head>

<body>

<div class="quiz-container">

    <h2>Translate:</h2>
    <div class="prompt"></div>

    <div class="slots-container" id="slotsContainer"></div>
    <div class="words-container" id="wordsContainer"></div>

    <button class="check-btn" onclick="checkAnswer()">CHECK</button>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">NEXT</button>

    <div class="feedback" id="feedback"></div>

</div>

<script>
const questions = [
    {
        prompt: "O cabelo dela é azul.",
        words: ["blue", "is", "hair", "her"],
        answer: ["her", "hair", "is", "blue"]
    },
    {
        prompt: "O gato é preto.",
        words: ["black", "is", "cat", "the"],
        answer: ["the", "cat", "is", "black"]
    },
    {
        prompt: "Eu gosto de música.",
        words: ["music", "like", "I"],
        answer: ["I", "like", "music"]
    }
];

let current = 0;

const slotsContainer = document.getElementById("slotsContainer");
const wordsContainer = document.getElementById("wordsContainer");

function loadQuestion() {
    const q = questions[current];

    document.querySelector(".prompt").innerText = q.prompt;
    document.getElementById("feedback").innerText = "";
    document.getElementById("nextBtn").style.display = "none";

    slotsContainer.innerHTML = "";
    wordsContainer.innerHTML = "";

    // create slots
    q.answer.forEach((_, i) => {
        const slot = document.createElement("div");
        slot.className = "slot";

        slot.addEventListener("dragover", e => {
            e.preventDefault();
            slot.classList.add("drag-over");
        });

        slot.addEventListener("dragleave", () => {
            slot.classList.remove("drag-over");
        });

        slot.addEventListener("drop", e => {
            e.preventDefault();
            slot.classList.remove("drag-over");

            const id = e.dataTransfer.getData("text");
            const word = document.getElementById(id);

            if (!slot.children.length) {
                slot.appendChild(word);
            }
        });

        slotsContainer.appendChild(slot);
    });

    // create words
    q.words.forEach((w, i) => {
        const div = document.createElement("div");
        div.className = "word";
        div.innerText = w;
        div.id = "w-" + i;

        div.draggable = true;

        div.addEventListener("dragstart", e => {
            div.classList.add("dragging");
            e.dataTransfer.setData("text", div.id);
        });

        div.addEventListener("dragend", () => {
            div.classList.remove("dragging");
        });

        wordsContainer.appendChild(div);
    });
}

function checkAnswer() {
    const q = questions[current];
    const slots = document.querySelectorAll(".slot");

    let correct = true;

    slots.forEach((slot, i) => {
        if (!slot.children.length) correct = false;
        else {
            const word = slot.children[0].innerText;
            if (word !== q.answer[i]) correct = false;
        }
    });

    const feedback = document.getElementById("feedback");

    if (correct) {
        feedback.innerText = "Correct!";
        feedback.className = "feedback correct";
        document.getElementById("nextBtn").style.display = "block";
    } else {
        feedback.innerText = "Try again!";
        feedback.className = "feedback incorrect";
    }
}

function nextQuestion() {
    current++;

    if (current >= questions.length) {
        document.querySelector(".quiz-container").innerHTML =
            "<h2>🎉 Finished all questions!</h2>";
        return;
    }

    loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
