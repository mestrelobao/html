<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Learning Quiz - Multi-Level</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .quiz-container {
            background-color: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        h2 {
            color: #333;
            margin-bottom: 5px;
        }
        .prompt {
            font-size: 26px;
            font-weight: bold;
            color: #1cb0f6;
            margin-bottom: 25px;
        }
        .slots-container, .words-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            min-height: 55px;
            flex-wrap: wrap;
            align-items: center;
        }
        .slot {
            width: 85px;
            height: 48px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s, border-color 0.2s;
        }
        .slot.drag-over {
            background-color: #e1f5fe;
            border-color: #1cb0f6;
        }
        .word {
            padding: 10px 18px;
            background-color: white;
            border: 2px solid #e5e5e5;
            border-bottom: 4px solid #e5e5e5;
            border-radius: 8px;
            cursor: grab;
            font-weight: bold;
            color: #4b4b4b;
            user-select: none;
        }
        .word:active {
            cursor: grabbing;
        }
        .word.dragging {
            opacity: 0.4;
        }
        .btn-container {
            display: flex;
            gap: 15px;
        }
        button {
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            flex: 1;
            transition: background-color 0.2s;
        }
        .check-btn {
            background-color: #58cc02;
            border-bottom: 4px solid #46a302;
        }
        .check-btn:hover { background-color: #61e002; }
        .next-btn {
            background-color: #1cb0f6;
            border-bottom: 4px solid #1899d6;
            display: none; /* Hidden until correct answer */
        }
        .next-btn:hover { background-color: #24bfff; }
        button:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }
        .feedback {
            margin-top: 20px;
            font-weight: bold;
            font-size: 20px;
            min-height: 28px;
        }
        .correct { color: #58cc02; }
        .incorrect { color: #ea2b2b; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h2>Translate this sentence:</h2>
    <div class="prompt" id="sentencePrompt">Loading...</div>

    <!-- Drop Slots -->
    <div class="slots-container" id="slotsContainer"></div>

    <!-- Word Pool -->
    <div class="words-container" id="wordsContainer"></div>

    <div class="btn-container">
        <button class="check-btn" id="checkBtn" onclick="checkAnswer()">CHECK ANSWER</button>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">NEXT QUESTION →</button>
    </div>
    
    <div class="feedback" id="feedback"></div>
</div>

<script>
    // System data holding your custom questions, options, and target order
    const questions = [
        {
            portuguese: "O cabelo dela é azul.",
            words: ["blue", "is", "hair", "her"],
            correctOrder: ["her", "hair", "is", "blue"]
        },
        {
            portuguese: "Eu gosto de jogar video game.",
            words: ["like", "video", "play", "game", "I", "to"],
            correctOrder: ["I", "like", "to", "play", "video", "game"]
        }
    ];

    let currentQuestionIndex = 0;

    function loadQuestion(index) {
        if (index >= questions.length) {
            document.querySelector('.quiz-container').innerHTML = "🎉 <h2>Congratulations! You finished the quiz!</h2>";
            return;
        }

        const quiz = questions[index];
        document.getElementById('sentencePrompt').innerText = `"${quiz.portuguese}"`;
        document.getElementById('feedback').innerText = "";
        document.getElementById('nextBtn').style.display = "none";
        document.getElementById('checkBtn').style.display = "block";

        // Build blank target slots dynamically
        const slotsContainer = document.getElementById('slotsContainer');
        slotsContainer.innerHTML = "";
        quiz.correctOrder.forEach(() => {
            const slot = document.createElement('div');
            slot.className = 'slot';
            setupSlotEvents(slot);
            slotsContainer.appendChild(slot);
        });

        // Build word pool elements dynamically
        const wordsContainer = document.getElementById('wordsContainer');
        wordsContainer.innerHTML = "";
        quiz.words.forEach((wordText, i) => {
            const word = document.createElement('div');
            word.className = 'word';
            word.draggable = true;
            word.id = `word-${i}`;
            word.innerText = wordText;
            setupWordEvents(word);
            wordsContainer.appendChild(word);
        });
    }

    // --- DRAG AND DROP SETUP LOGIC ---

    function setupWordEvents(word) {
        word.addEventListener('dragstart', (e) => {
            word.classList.add('dragging');
            e.dataTransfer.setData('text/plain', word.id);
        });

        word.addEventListener('dragend', () => {
            word.classList.remove('dragging');
        });

        // Tap/click fallback support
        word.addEventListener('click', () => {
            const slotsContainer = document.getElementById('slotsContainer');
            const wordsContainer = document.getElementById('wordsContainer');
            
            if (word.parentElement.classList.contains('slot')) {
                wordsContainer.appendChild(word);
            } else {
                const slots = slotsContainer.querySelectorAll('.slot');
                const firstEmptySlot = Array.from(slots).find(slot => slot.children.length === 0);
                if (firstEmptySlot) {
                    firstEmptySlot.appendChild(word);
                }
            }
            document.getElementById('feedback').innerText = "";
        });
    }

    function setupSlotEvents(slot) {
        slot.addEventListener('dragover', (e) => {
            e.preventDefault();
            if (slot.children.length === 0) {
                slot.classList.add('drag-over');
            }
        });

        slot.addEventListener('dragleave', () => {
            slot.classList.remove('drag-over');
        });

        slot.addEventListener('drop', (e) => {
            e.preventDefault();
            slot.classList.remove('drag-over');
            if (slot.children.length === 0) {
                const wordId = e.dataTransfer.getData('text/plain');
                const draggedWord = document.getElementById(wordId);
                slot.appendChild(draggedWord);
                document.getElementById('feedback').innerText = "";
            }
        });
    }

    // Initialize global wrapper zone drop rules
    document.getElementById('wordsContainer').addEventListener('dragover', (e) => e.preventDefault());
    document.getElementById('wordsContainer').addEventListener('drop', (e) => {
        e.preventDefault();
        const wordId = e.dataTransfer.getData('text/plain');
        const draggedWord = document.getElementById(wordId);
        document.getElementById('wordsContainer').appendChild(draggedWord);
        document.getElementById('feedback').innerText = "";
    });

    // --- CHECK AND ANIMATION EVALUATION LOGIC ---

    function checkAnswer() {
        const feedback = document.getElementById('feedback');
        const slots = document.querySelectorAll('.slot');
        const quiz = questions[currentQuestionIndex];
        
        let filledCount = 0;
        let isCorrect = true;

        slots.forEach((slot, index) => {
            if (slot.children.length > 0) {
                filledCount++;
                const wordText = slot.children[0].innerText;
                if (wordText !== quiz.correctOrder[index]) {
                    isCorrect = false;
                }
            } else {
                isCorrect = false;
            }
        });

        if (filledCount < quiz.correctOrder.length) {
            feedback.className = "feedback incorrect";
            feedback.innerText = "Please use all the words to fill the blanks!";
            return;
        }

        if (isCorrect) {
            feedback.className = "feedback correct";
            feedback.innerText = "🎉 Amazing! You got it right!";
            document.getElementById('nextBtn').style.display = "block";
            document.getElementById('checkBtn').style.display = "none";
        } else {
            feedback.className = "feedback incorrect";
            feedback.innerText = "❌ Not quite right. Drag them around to change order!";
        }
    }

    function nextQuestion() {
        currentQuestionIndex++;
        loadQuestion(currentQuestionIndex);
    }

    // Boot startup initial question
