<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Duet Recorder</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.row {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

video {
  width: 300px;
  height: 533px;
  background: black;
  object-fit: cover;
}

.controls {
  margin-top: 15px;
}

button {
  padding: 10px 16px;
  margin: 5px;
}
</style>
</head>

<body>

<h2>Duet Recorder (Guia + Gravação)</h2>

<input type="file" id="fileInput" accept="video/*">

<div class="controls">
  <button onclick="start()">▶ Gravar</button>
  <button onclick="stop()">⏹ Parar</button>
</div>

<div class="row">
  <video id="guide" controls></video>
  <video id="recorded" controls></video>
</div>

<!-- 🔥 CONTROLES NOVOS (ABAIXO DOS VÍDEOS) -->
<div class="controls">

  <div>
    <button onclick="playBoth()">▶ Play</button>
    <button onclick="pauseBoth()">⏹ Stop</button>
  </div>

  <div>
    Offset vídeo gravado (segundos):
    <input type="number" id="offset" step="0.1" value="0">
    <button onclick="applyOffset()">Aplicar</button>
  </div>

</div>

<script>
let stream;
let recorder;
let chunks = [];

const guide = document.getElementById("guide");
const recorded = document.getElementById("recorded");

// 📂 carregar vídeo guia
document.getElementById("fileInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  guide.src = URL.createObjectURL(file);
});

// ▶ gravar
async function start() {
  chunks = [];

  stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  recorder = new MediaRecorder(stream);

  recorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    const url = URL.createObjectURL(blob);

    recorded.src = url;
    recorded.controls = true;
    recorded.autoplay = false;
    recorded.muted = false;
  };

  recorder.start();
}

// ⏹ parar gravação
function stop() {
  if (recorder && recorder.state !== "inactive") {
    recorder.stop();
  }

  stream?.getTracks().forEach(t => t.stop());
  guide.pause();
}

// ▶ play ambos
function playBoth() {
  guide.play();
  recorded.play();
}

// ⏹ pause ambos
function pauseBoth() {
  guide.pause();
  recorded.pause();
}

// 🎚 offset do vídeo gravado
function applyOffset() {
  const offset = parseFloat(document.getElementById("offset").value) || 0;

  recorded.currentTime = offset;
}
</script>

</body>
</html>
