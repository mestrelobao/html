<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Duet Recorder (Master Sync)</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.row {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

video {
  width: 300px;
  height: 533px;
  background: black;
  object-fit: cover;
}

.controls {
  margin-top: 15px;
}

button {
  padding: 10px 16px;
  margin: 5px;
}
</style>
</head>

<body>

<h2>Duet Recorder (Master Sync)</h2>

<input type="file" id="fileInput" accept="video/*">

<div class="controls">
  <button onclick="start()">▶ Gravar</button>
  <button onclick="stop()">⏹ Parar</button>
</div>

<div class="row">
  <video id="guide" controls></video>
  <video id="recorded" controls></video>
</div>

<!-- 🎯 CONTROLES MASTER -->
<div class="controls">
  <button onclick="playMaster()">▶ Play Master</button>
  <button onclick="pauseMaster()">⏸ Pause Master</button>
</div>

<script>
let stream;
let recorder;
let chunks = [];

const guide = document.getElementById("guide");
const recorded = document.getElementById("recorded");

// 📂 carregar vídeo guia
document.getElementById("fileInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  guide.src = URL.createObjectURL(file);
});

// ▶ gravar
async function start() {
  chunks = [];

  stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  recorder = new MediaRecorder(stream);

  recorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    const url = URL.createObjectURL(blob);

    recorded.src = url;
    recorded.controls = true;
    recorded.autoplay = false;
    recorded.muted = false;
  };

  recorder.start();
}

// ⏹ parar gravação
function stop() {
  if (recorder && recorder.state !== "inactive") {
    recorder.stop();
  }

  stream?.getTracks().forEach(t => t.stop());
  guide.pause();
}

// 🎯 PLAY MASTER (sincronizado)
function playMaster() {
  guide.play().catch(() => {});
  recorded.play().catch(() => {});

  syncLoop();
}

// ⏸ PAUSE MASTER
function pauseMaster() {
  guide.pause();
  recorded.pause();
}

// 🔁 loop de sincronização
function syncLoop() {
  if (guide.paused || recorded.paused) return;

  const diff = guide.currentTime - recorded.currentTime;

  if (Math.abs(diff) > 0.03) {
    recorded.currentTime += diff;
  }

  requestAnimationFrame(syncLoop);
}
</script>

</body>
</html>
