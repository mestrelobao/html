<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Duet Sync Player</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.row {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

video {
  width: 300px;
  height: 533px;
  background: black;
  object-fit: cover;
}

.controls {
  margin-top: 15px;
}

button {
  padding: 10px 16px;
  margin: 5px;
}

input {
  width: 80px;
}
</style>
</head>

<body>

<h2>Duet Sync Player</h2>

<div class="controls">
  <input type="file" id="v1" accept="video/*">
  <input type="file" id="v2" accept="video/*">
</div>

<div class="controls">
  <button onclick="playBoth()">▶ Play</button>
  <button onclick="pauseBoth()">⏸ Pause</button>
</div>

<div class="controls">
  Offset vídeo 2 (segundos):
  <input type="number" id="offset" step="0.1" value="0">
  <button onclick="applyOffset()">Aplicar</button>
</div>

<div class="row">
  <video id="video1" controls></video>
  <video id="video2" controls></video>
</div>

<script>
const v1 = document.getElementById("video1");
const v2 = document.getElementById("video2");

// 📂 carregar vídeos
document.getElementById("v1").addEventListener("change", e => {
  v1.src = URL.createObjectURL(e.target.files[0]);
});

document.getElementById("v2").addEventListener("change", e => {
  v2.src = URL.createObjectURL(e.target.files[0]);
});

// ▶ play sincronizado
function playBoth() {
  v1.play();
  v2.play();

  syncLoop();
}

// ⏸ pause sincronizado
function pauseBoth() {
  v1.pause();
  v2.pause();
}

// 🎯 aplica offset no vídeo 2
function applyOffset() {
  const offset = parseFloat(document.getElementById("offset").value) || 0;

  v1.currentTime = 0;
  v2.currentTime = offset;
}

// 🔁 mantém sincronizado durante playback
function syncLoop() {
  const sync = () => {
    if (v1.paused || v2.paused) return;

    const diff = v1.currentTime - v2.currentTime;

    if (Math.abs(diff) > 0.05) {
      v2.currentTime += diff;
    }

    requestAnimationFrame(sync);
  };

  sync();
}
</script>

</body>
</html>
