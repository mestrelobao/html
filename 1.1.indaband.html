<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Duet Recorder FINAL FIX</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.row {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

video {
  width: 300px;
  height: 533px;
  background: black;
  object-fit: cover;
}

.controls {
  margin-top: 15px;
}

button {
  padding: 10px 16px;
  margin: 5px;
}

input {
  width: 80px;
}

canvas {
  display: none;
}
</style>
</head>

<body>

<h2>Duet Recorder FINAL FIX</h2>

<input type="file" id="fileInput" accept="video/*">

<div class="controls">
  <button onclick="start()">▶ Gravar</button>
  <button onclick="stop()">⏹ Parar</button>
</div>

<div class="row">
  <video id="guide" controls></video>
  <video id="recorded" controls></video>
</div>

<div class="controls">
  Guide Offset:
  <input type="number" id="offsetGuide" value="0" step="0.1">

  Recorded Offset:
  <input type="number" id="offsetRecorded" value="0" step="0.1">
</div>

<div class="controls">
  <button onclick="playMaster()">▶ Play</button>
  <button onclick="pauseMaster()">⏸ Pause</button>
</div>

<div class="controls">
  <button onclick="exportVideo()">⬇ EXPORT FINAL (ÁUDIO OK)</button>
</div>

<canvas id="canvas" width="600" height="533"></canvas>

<script>
let stream;
let recorder;
let chunks = [];

const guide = document.getElementById("guide");
const recorded = document.getElementById("recorded");

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const offsetGuideInput = document.getElementById("offsetGuide");
const offsetRecordedInput = document.getElementById("offsetRecorded");

// carregar vídeo guia
fileInput.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  guide.src = URL.createObjectURL(file);
});

// 🎥 grava câmera
async function start() {
  chunks = [];

  stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  recorder = new MediaRecorder(stream);

  recorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    recorded.src = URL.createObjectURL(blob);
  };

  const og = parseFloat(offsetGuideInput.value) || 0;

  guide.currentTime = og;
  await guide.play().catch(()=>{});

  recorder.start();
}

// ⏹ parar
function stop() {
  recorder?.stop();
  stream?.getTracks().forEach(t => t.stop());
  guide.pause();
}

// ▶ play sincronizado
function playMaster() {
  const og = parseFloat(offsetGuideInput.value) || 0;
  const or = parseFloat(offsetRecordedInput.value) || 0;

  guide.currentTime = og;
  recorded.currentTime = or;

  guide.play();
  recorded.play();
}

function pauseMaster() {
  guide.pause();
  recorded.pause();
}

// 🎬 canvas render
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.drawImage(guide, 0, 0, canvas.width / 2, canvas.height);
  ctx.drawImage(recorded, canvas.width / 2, 0, canvas.width / 2, canvas.height);

  requestAnimationFrame(draw);
}

// 🎧 AUDIO MIX REAL (CORRETO)
async function createAudioMix() {
  const audioContext = new AudioContext();
  await audioContext.resume();

  const destination = audioContext.createMediaStreamDestination();

  await guide.play().catch(()=>{});
  await recorded.play().catch(()=>{});

  const guideSource = audioContext.createMediaElementSource(guide);
  const recordedSource = audioContext.createMediaElementSource(recorded);

  const guideGain = audioContext.createGain();
  const recordedGain = audioContext.createGain();

  guideGain.gain.value = 0.8;
  recordedGain.gain.value = 1.0;

  guideSource.connect(guideGain).connect(destination);
  recordedSource.connect(recordedGain).connect(destination);

  guide.muted = true;
  recorded.muted = true;

  return destination.stream;
}

// 🎥 EXPORT FINAL DEFINITIVO
async function exportVideo() {
  const og = parseFloat(offsetGuideInput.value) || 0;
  const or = parseFloat(offsetRecordedInput.value) || 0;

  guide.currentTime = og;
  recorded.currentTime = or;

  await guide.play().catch(()=>{});
  await recorded.play().catch(()=>{});

  await new Promise(r => setTimeout(r, 200));

  const canvasStream = canvas.captureStream(30);

  const audioStream = await createAudioMix();

  const finalStream = new MediaStream([
    ...canvasStream.getVideoTracks(),
    ...audioStream.getAudioTracks()
  ]);

  console.log("audio tracks:", finalStream.getAudioTracks().length);

  const recorderFinal = new MediaRecorder(finalStream, {
    mimeType: "video/webm;codecs=vp8,opus"
  });

  let chunksFinal = [];

  recorderFinal.ondataavailable = e => {
    if (e.data.size > 0) chunksFinal.push(e.data);
  };

  recorderFinal.onstop = () => {
    const blob = new Blob(chunksFinal, { type: "video/webm" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "duet-final-ok.webm";
    a.click();
  };

  draw();
  recorderFinal.start();

  const duration = Math.min(
    guide.duration - og,
    recorded.duration - or
  );

  setTimeout(() => {
    recorderFinal.stop();
    guide.pause();
    recorded.pause();
  }, duration * 1000);
}
</script>

</body>
</html>
