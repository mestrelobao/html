<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Converter WEBM para MP4</title>
</head>
<body>
  <h2>Converter WEBM → MP4</h2>

  <input type="file" id="upload" accept="video/webm" />
  <br><br>

  <button id="convert">Converter</button>
  <p id="status"></p>

  <a id="download" style="display:none;">Baixar MP4</a>

  <script type="module">
    import { createFFmpeg, fetchFile } from "https://mestrelobao.github.io/html/ffmpeg.min.js";

    const ffmpeg = createFFmpeg({ log: true });

    const upload = document.getElementById("upload");
    const convertBtn = document.getElementById("convert");
    const status = document.getElementById("status");
    const download = document.getElementById("download");

    convertBtn.onclick = async () => {
      const file = upload.files[0];
      if (!file) {
        alert("Selecione um arquivo WEBM");
        return;
      }

      status.textContent = "Carregando FFmpeg...";
      if (!ffmpeg.isLoaded()) {
        await ffmpeg.load();
      }

      status.textContent = "Processando vídeo...";

      ffmpeg.FS("writeFile", "input.webm", await fetchFile(file));

      await ffmpeg.run(
        "-i", "input.webm",
        "-c:v", "libx264",
        "-preset", "fast",
        "-c:a", "aac",
        "output.mp4"
      );

      const data = ffmpeg.FS("readFile", "output.mp4");

      const url = URL.createObjectURL(
        new Blob([data.buffer], { type: "video/mp4" })
      );

      download.href = url;
      download.download = "video.mp4";
      download.style.display = "block";
      download.textContent = "Baixar MP4";

      status.textContent = "Conversão concluída!";
    };
  </script>
</body>
</html>
