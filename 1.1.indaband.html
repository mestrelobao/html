<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dual Recorder</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

video {
  width: 300px;
  height: 533px;
  background: black;
  margin: 10px;
}

.controls {
  margin: 10px;
}

button {
  padding: 10px;
}
</style>
</head>

<body>

<h2>Dual Recorder (SEPARADO)</h2>

<input type="file" id="fileInput" accept="video/*">

<div class="controls">
  Guide Offset (segundos):
  <input type="number" id="offsetGuide" value="0" step="0.1">
</div>

<div class="controls">
  <button onclick="start()">▶ Gravar</button>
  <button onclick="stop()">⏹ Parar</button>
</div>

<h3>Preview</h3>
<video id="guide" controls></video>
<video id="recorded" controls></video>

<script>
let camStream;
let camRecorder;
let camChunks = [];

const guide = document.getElementById("guide");
const recorded = document.getElementById("recorded");

// carregar vídeo guia
fileInput.addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  guide.src = URL.createObjectURL(file);
});

// 🎥 START
async function start() {
  camChunks = [];

  const offset = parseFloat(offsetGuide.value) || 0;

  camStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  camRecorder = new MediaRecorder(camStream);

  camRecorder.ondataavailable = e => {
    if (e.data.size > 0) camChunks.push(e.data);
  };

  camRecorder.onstop = () => {
    const blob = new Blob(camChunks, { type: "video/webm" });
    recorded.src = URL.createObjectURL(blob);
  };

  // 🎬 sincroniza guia (offset aplicado aqui)
  guide.currentTime = offset;
  guide.play().catch(()=>{});

  camRecorder.start();
}

// ⏹ STOP
function stop() {
  camRecorder?.stop();
  camStream?.getTracks().forEach(t => t.stop());
  guide.pause();
}

// 🔥 EXPORT (2 arquivos separados)
function exportSeparate() {
  if (!guide.src || !recorded.src) {
    alert("Grave os dois vídeos primeiro");
    return;
  }

  // download guia
  const a1 = document.createElement("a");
  a1.href = guide.src;
  a1.download = "guide.mp4";
  a1.click();

  // download gravado
  const a2 = document.createElement("a");
  a2.href = recorded.src;
  a2.download = "camera.webm";
  a2.click();
}
</script>

<div class="controls">
  <button onclick="exportSeparate()">⬇ Baixar vídeos separados</button>
</div>

</body>
</html>
