<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Shorts Recorder</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* preview vertical */
video {
  width: 300px;
  height: 533px; /* 9:16 */
  background: black;
  object-fit: cover;
  margin-top: 20px;
}

.controls {
  margin-top: 20px;
}

button {
  padding: 10px 16px;
  margin: 5px;
}
</style>
</head>

<body>

<h2>Gravação em formato Shorts (9:16)</h2>

<video id="preview" autoplay playsinline muted></video>

<div class="controls">
  <button onclick="start()">▶ Start</button>
  <button onclick="stop()">⏹ Stop</button>
</div>

<script>
let stream;
let recorder;
let chunks = [];
let canvasStream;

async function start() {
  // pega câmera
  stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  const video = document.getElementById("preview");
  video.srcObject = stream;

  // cria canvas vertical (Shorts)
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = 1080;
  canvas.height = 1920;

  function draw() {
    // desenha o vídeo ocupando formato vertical
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    requestAnimationFrame(draw);
  }

  draw();

  // captura stream do canvas
  canvasStream = canvas.captureStream(30);

  // adiciona áudio original
  stream.getAudioTracks().forEach(track => {
    canvasStream.addTrack(track);
  });

  recorder = new MediaRecorder(canvasStream);

  recorder.ondataavailable = e => {
    if (e.data.size > 0) {
      chunks.push(e.data);
    }
  };

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    const url = URL.createObjectURL(blob);

    const playback = document.createElement("video");
    playback.src = url;
    playback.controls = true;
    playback.autoplay = true;
    playback.style.width = "300px";
    playback.style.height = "533px";

    document.body.appendChild(playback);
  };

  recorder.start();
}

function stop() {
  if (recorder && recorder.state !== "inactive") {
    recorder.stop();
  }

  stream?.getTracks().forEach(t => t.stop());
}
</script>

</body>
</html>
