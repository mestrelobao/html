<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Shorts Recorder</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

video {
  width: 300px;
  height: 533px; /* 9:16 */
  background: black;
  object-fit: cover;
  margin-top: 20px;
}

.controls {
  margin-top: 20px;
}

button {
  padding: 10px 16px;
  margin: 5px;
}
</style>
</head>

<body>

<h2>Gravação em formato Shorts (9:16)</h2>

<video id="preview" autoplay playsinline muted></video>

<div class="controls">
  <button onclick="start()">▶ Start</button>
  <button onclick="stop()">⏹ Stop</button>
</div>

<!-- 🔥 container único para o vídeo gravado -->
<div id="output"></div>

<script>
let stream;
let recorder;
let chunks = [];
let canvasStream;

async function start() {
  chunks = [];

  // 🔥 limpa vídeo anterior (reset)
  document.getElementById("output").innerHTML = "";

  stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  const video = document.getElementById("preview");
  video.srcObject = stream;

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = 1080;
  canvas.height = 1920;

  function draw() {
    const vw = video.videoWidth;
    const vh = video.videoHeight;

    if (!vw || !vh) {
      requestAnimationFrame(draw);
      return;
    }

    const canvasRatio = canvas.width / canvas.height;
    const videoRatio = vw / vh;

    let sx, sy, sw, sh;

    if (videoRatio > canvasRatio) {
      // corta lados
      sh = vh;
      sw = vh * canvasRatio;
      sx = (vw - sw) / 2;
      sy = 0;
    } else {
      // corta topo/baixo
      sw = vw;
      sh = vw / canvasRatio;
      sx = 0;
      sy = (vh - sh) / 2;
    }

    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);

    requestAnimationFrame(draw);
  }

  video.onloadedmetadata = () => {
    draw();
  };

  // stream final (canvas)
  canvasStream = canvas.captureStream(30);

  // adiciona áudio
  stream.getAudioTracks().forEach(track => {
    canvasStream.addTrack(track);
  });

  recorder = new MediaRecorder(canvasStream);

  recorder.ondataavailable = e => {
    if (e.data.size > 0) {
      chunks.push(e.data);
    }
  };

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    const url = URL.createObjectURL(blob);

    const playback = document.createElement("video");
    playback.src = url;
    playback.controls = true;
    playback.autoplay = true;
    playback.style.width = "300px";
    playback.style.height = "533px";

    const output = document.getElementById("output");

    // 🔥 garante substituição
    output.innerHTML = "";
    output.appendChild(playback);
  };

  recorder.start();
}

function stop() {
  if (recorder && recorder.state !== "inactive") {
    recorder.stop();
  }

  stream?.getTracks().forEach(t => t.stop());
}
</script>

</body>
</html>
