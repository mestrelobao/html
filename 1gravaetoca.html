<script>
let stream;
let videoEl;
let canvas;
let ctx;

let recorder = null;
let chunks = [];

let blob1 = null;
let blob2 = null;
let currentSlot = 1;

// 🎥 inicia câmera 1 vez só
async function initCamera() {
  if (stream) return;

  stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  videoEl = document.getElementById("preview");
  videoEl.srcObject = stream;

  canvas = document.createElement("canvas");
  ctx = canvas.getContext("2d");

  canvas.width = 1080;
  canvas.height = 1920;

  draw();
}

// 🎬 render contínuo (IMPORTANTE: só 1 vez)
function draw() {
  const vw = videoEl.videoWidth;
  const vh = videoEl.videoHeight;

  if (vw && vh) {
    const canvasRatio = canvas.width / canvas.height;
    const videoRatio = vw / vh;

    let sx, sy, sw, sh;

    if (videoRatio > canvasRatio) {
      sh = vh;
      sw = vh * canvasRatio;
      sx = (vw - sw) / 2;
      sy = 0;
    } else {
      sw = vw;
      sh = vw * canvasRatio;
      sx = 0;
      sy = (vh - sh) / 2;
    }

    ctx.drawImage(videoEl, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
  }

  requestAnimationFrame(draw);
}

// ▶ grava 1 ou 2
async function startRecording(slot) {
  await initCamera();

  currentSlot = slot;
  chunks = [];

  const canvasStream = canvas.captureStream(30);

  // áudio sempre do stream original
  stream.getAudioTracks().forEach(t => canvasStream.addTrack(t));

  recorder = new MediaRecorder(canvasStream);

  recorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });

    if (currentSlot === 1) {
      blob1 = blob;
    } else {
      blob2 = blob;
    }

    refreshPlayers();
  };

  recorder.start();
}

// 🎬 botões separados
function startFirst() {
  startRecording(1);
}

function startSecond() {
  startRecording(2);
}

// ⏹ stop
function stop() {
  if (recorder && recorder.state !== "inactive") {
    recorder.stop();
  }
}

// 📺 mostra vídeos
function refreshPlayers() {
  if (blob1) {
    document.getElementById("video1").src = URL.createObjectURL(blob1);
  }

  if (blob2) {
    document.getElementById("video2").src = URL.createObjectURL(blob2);
  }
}
</script>
