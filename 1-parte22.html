<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Duet Recorder</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.row {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

video {
  width: 300px;
  height: 533px;
  background: black;
  object-fit: cover;
}

.controls {
  margin-top: 15px;
}

button {
  padding: 10px 16px;
  margin: 5px;
}

input {
  width: 80px;
}
</style>
</head>

<body>

<h2>Duet Recorder</h2>

<input type="file" id="fileInput1" accept="video/*"><input type="file" id="fileInput2" accept="video/*">

<div class="row">
  <video id="guide" controls></video>
  <video id="recorded" controls></video>
</div>

<!-- 🎚 OFFSETS -->
<div class="controls">
  Guide Offset:
  <input type="number" id="offsetGuide" step="0.1" value="0">

  Recorded Offset:
  <input type="number" id="offsetRecorded" step="0.1" value="0">
</div>

<div class="controls">
  <button onclick="playMaster()">▶ Play</button>
  <button onclick="pauseMaster()">⏸ Pause</button>
</div>

<script>
let stream;
let recorder;
let chunks = [];

const guide = document.getElementById("guide");
const recorded = document.getElementById("recorded");

// carregar vídeo
document.getElementById("fileInput1").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  guide.src = URL.createObjectURL(file);
});
document.getElementById("fileInput2").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  recorded.src = URL.createObjectURL(file);
});  

// ▶ PLAY COM DOIS OFFSETS
function playMaster() {
  const offsetGuide = parseFloat(document.getElementById("offsetGuide").value) || 0;
  const offsetRecorded = parseFloat(document.getElementById("offsetRecorded").value) || 0;

  guide.currentTime = Math.max(0, offsetGuide);
  recorded.currentTime = Math.max(0, offsetRecorded);

  guide.play().catch(() => {});
  recorded.play().catch(() => {});
}

// ⏸ pause
function pauseMaster() {
  guide.pause();
  recorded.pause();
}
</script>

</body>
</html>
