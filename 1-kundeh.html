<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Duet Recorder</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.row {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

video {
  width: 300px;
  height: 533px;
  background: black;
  object-fit: cover;
}

.controls {
  margin-top: 15px;
}

button {
  padding: 10px 16px;
  margin: 5px;
}

input {
  width: 80px;
}
</style>
</head>

<body>

<h2>Duet Recorder</h2>

<input type="file" id="fileInput" accept="video/*">

<div class="controls">
  <button onclick="start()">▶ Gravar</button>
  <button onclick="stop()">⏹ Parar</button>
</div>

<div class="row">
  <video id="guide" controls></video>
  <video id="recorded" controls></video>
</div>

<div class="controls">
  Offset (segundos):
  <input type="number" id="offset" step="0.1" value="0">
</div>

<div class="controls">
  <button onclick="playMaster()">▶ Play</button>
  <button onclick="pauseMaster()">⏸ Pause</button>
</div>

<script>
let stream;
let recorder;
let chunks = [];

const guide = document.getElementById("guide");
const recorded = document.getElementById("recorded");

// carregar vídeo
document.getElementById("fileInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  guide.src = URL.createObjectURL(file);
});

// 🎥 gravação + autoplay do guide
async function start() {
  chunks = [];

  stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  recorder = new MediaRecorder(stream);

  recorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    recorded.src = URL.createObjectURL(blob);
  };

  // 🔥 inicia o guide junto
  guide.currentTime = 0;
  guide.play().catch(() => {});

  recorder.start();
}

// ⏹ parar
function stop() {
  recorder?.stop();
  stream?.getTracks().forEach(t => t.stop());
  guide.pause();
}

// ▶ play manual com offset
function playMaster() {
  const offset = parseFloat(document.getElementById("offset").value) || 0;

  guide.currentTime = 0;
  recorded.currentTime = 0;

  guide.play();

  setTimeout(() => {
    recorded.play();
  }, offset * 1);
}

// ⏸ pause
function pauseMaster() {
  guide.pause();
  recorded.pause();
}
</script>

</body>
</html>
