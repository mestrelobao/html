<input type="file" id="v1" accept="video/*" />
<input type="file" id="v2" accept="video/*" />

<br><br>

<button onclick="autoSync()">Auto Sync</button>

<br><br>

<label>Offset manual (segundos):</label>
<input type="number" id="manualOffset" step="0.1" value="0" />
<button onclick="applyManualOffset()">Aplicar Offset</button>

<br><br>

<video id="video1" controls width="300"></video>
<video id="video2" controls width="300"></video>

<script>
let currentOffset = 0;

function loadVideos(file1, file2) {
  const v1 = document.getElementById("video1");
  const v2 = document.getElementById("video2");

  v1.src = URL.createObjectURL(file1);
  v2.src = URL.createObjectURL(file2);
}

function applyOffset(offset) {
  const v1 = document.getElementById("video1");
  const v2 = document.getElementById("video2");

  v1.pause();
  v2.pause();

  v1.currentTime = 0;
  v2.currentTime = 0;

  if (offset > 0) {
    v2.currentTime = offset;
  } else {
    v1.currentTime = -offset;
  }

  currentOffset = offset;

  Promise.all([v1.play(), v2.play()]);
}

function applyManualOffset() {
  const offset = parseFloat(
    document.getElementById("manualOffset").value
  );
  applyOffset(offset);
}

// (mesma função de auto sync de antes, simplificada)
async function autoSync() {
  const file1 = document.getElementById("v1").files[0];
  const file2 = document.getElementById("v2").files[0];

  loadVideos(file1, file2);

  const offset = await calculateOffset(file1, file2);

  document.getElementById("manualOffset").value = offset.toFixed(2);

  applyOffset(offset);
}

// ===== cálculo de offset (igual ao anterior) =====

async function getAudioBuffer(file, audioContext) {
  const arrayBuffer = await file.arrayBuffer();
  return await audioContext.decodeAudioData(arrayBuffer);
}

function toMono(buffer) {
  const mono = new Float32Array(buffer.length);
  for (let i = 0; i < buffer.length; i++) {
    mono[i] = buffer.getChannelData(0)[i];
  }
  return mono;
}

function downsample(data, factor = 20) {
  const result = [];
  for (let i = 0; i < data.length; i += factor) {
    result.push(data[i]);
  }
  return result;
}

function getEnergy(signal, frameSize = 1024) {
  const energy = [];
  for (let i = 0; i < signal.length; i += frameSize) {
    let sum = 0;
    for (let j = 0; j < frameSize; j++) {
      if (i + j < signal.length) {
        sum += signal[i + j] ** 2;
      }
    }
    energy.push(sum);
  }
  return energy;
}

function crossCorrelation(a, b) {
  let bestOffset = 0;
  let maxCorr = -Infinity;

  for (let offset = -b.length; offset < b.length; offset++) {
    let corr = 0;

    for (let i = 0; i < a.length; i++) {
      let j = i + offset;
      if (j >= 0 && j < b.length) {
        corr += a[i] * b[j];
      }
    }

    if (corr > maxCorr) {
      maxCorr = corr;
      bestOffset = offset;
    }
  }

  return bestOffset;
}

async function calculateOffset(file1, file2) {
  const audioContext = new AudioContext();

  const buffer1 = await getAudioBuffer(file1, audioContext);
  const buffer2 = await getAudioBuffer(file2, audioContext);

  let data1 = toMono(buffer1);
  let data2 = toMono(buffer2);

  data1 = downsample(data1, 20);
  data2 = downsample(data2, 20);

  const energy1 = getEnergy(data1);
  const energy2 = getEnergy(data2);

  const offset = crossCorrelation(energy1, energy2);

  return offset * (1024 * 20) / buffer1.sampleRate;
}

// ===== manter sincronizado =====
setInterval(() => {
  const v1 = document.getElementById("video1");
  const v2 = document.getElementById("video2");

  if (!v1.paused && !v2.paused) {
    const diff = v1.currentTime - v2.currentTime;

    if (Math.abs(diff) > 0.1) {
      v2.currentTime += diff;
    }
  }
}, 500);
</script>
