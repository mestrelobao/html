<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sincronizar Vídeos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }
    video {
      width: 45%;
      margin: 10px;
      border: 1px solid #ccc;
    }
    .controls {
      margin: 15px;
    }
  </style>
</head>
<body>

  <h2>Sincronizador de Vídeos</h2>

  <div class="controls">
    <input type="file" id="video1Input" accept="video/*">
    <input type="file" id="video2Input" accept="video/*">
  </div>

  <div class="controls">
    <label>Offset (segundos): </label>
    <input type="number" id="offset" value="0" step="0.1">
    <button onclick="syncVideos()">Sincronizar</button>
  </div>

  <div>
    <video id="video1" controls></video>
    <video id="video2" controls></video>
  </div>

  <script>
    const video1 = document.getElementById('video1');
    const video2 = document.getElementById('video2');

    document.getElementById('video1Input').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        video1.src = URL.createObjectURL(file);
      }
    });

    document.getElementById('video2Input').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        video2.src = URL.createObjectURL(file);
      }
    });

    function syncVideos() {
      const offset = parseFloat(document.getElementById('offset').value) || 0;

      // Quando o vídeo 1 tocar, o vídeo 2 sincroniza com offset
      video1.addEventListener('play', () => {
        video2.currentTime = video1.currentTime + offset;
        video2.play();
      });

      video1.addEventListener('pause', () => {
        video2.pause();
      });

      video1.addEventListener('seeked', () => {
        video2.currentTime = video1.currentTime + offset;
      });
    }
  </script>

</body>
</html>
