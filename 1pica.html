<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Sync Estéreo Inteligente</title>
</head>
<body>

<h2>Sincronização por canal direito (áudio referência)</h2>

<input type="file" id="v1" accept="video/*" />
<input type="file" id="v2" accept="video/*" />

<br><br>

<button onclick="autoSync()">Auto Sync</button>

<br><br>

<label>Offset manual (segundos):</label>
<input type="number" id="manualOffset" step="0.01" value="0" />
<button onclick="applyManual()">Aplicar Manual</button>

<br><br>

<video id="video1" controls width="320"></video>
<video id="video2" controls width="320"></video>

<script>
let lastOffset = 0;

// ================= AUDIO =================

async function getAudioBuffer(file, ctx) {
  const arrayBuffer = await file.arrayBuffer();
  return await ctx.decodeAudioData(arrayBuffer);
}

// 👉 pega canal direito (referência)
function getRightChannel(buffer) {
  if (buffer.numberOfChannels < 2) {
    throw new Error("Áudio precisa ser estéreo");
  }
  return buffer.getChannelData(1);
}

// mono helper (caso referência não seja estéreo)
function toMono(buffer) {
  const ch = [];
  for (let i = 0; i < buffer.numberOfChannels; i++) {
    ch.push(buffer.getChannelData(i));
  }

  const mono = new Float32Array(ch[0].length);

  for (let i = 0; i < mono.length; i++) {
    let sum = 0;
    for (let c of ch) sum += c[i];
    mono[i] = sum / ch.length;
  }

  return mono;
}

function downsample(data, factor = 20) {
  const out = [];
  for (let i = 0; i < data.length; i += factor) {
    out.push(data[i]);
  }
  return out;
}

function getEnergy(signal, frameSize = 1024) {
  const energy = [];
  for (let i = 0; i < signal.length; i += frameSize) {
    let sum = 0;
    for (let j = 0; j < frameSize; j++) {
      if (i + j < signal.length) {
        sum += signal[i + j] ** 2;
      }
    }
    energy.push(sum);
  }
  return energy;
}

function crossCorrelation(a, b) {
  let bestOffset = 0;
  let maxCorr = -Infinity;

  for (let offset = -b.length; offset < b.length; offset++) {
    let corr = 0;

    for (let i = 0; i < a.length; i++) {
      const j = i + offset;
      if (j >= 0 && j < b.length) {
        corr += a[i] * b[j];
      }
    }

    if (corr > maxCorr) {
      maxCorr = corr;
      bestOffset = offset;
    }
  }

  return bestOffset;
}

// ================= SYNC CORE =================

async function calculateOffset(file1, file2) {
  const ctx = new AudioContext();

  const buffer1 = await getAudioBuffer(file1, ctx);
  const buffer2 = await getAudioBuffer(file2, ctx);

  // vídeo 1 usa canal direito (referência embutida)
  let ref = getRightChannel(buffer1);

  // vídeo 2 também usa canal direito
  let target = getRightChannel(buffer2);

  ref = downsample(ref, 20);
  target = downsample(target, 20);

  const e1 = getEnergy(ref);
  const e2 = getEnergy(target);

  const offset = crossCorrelation(e1, e2);

  return offset * (1024 * 20) / buffer1.sampleRate;
}

// ================= VIDEO CONTROL =================

function loadVideos(file1, file2) {
  const v1 = document.getElementById("video1");
  const v2 = document.getElementById("video2");

  v1.src = URL.createObjectURL(file1);
  v2.src = URL.createObjectURL(file2);
}

function applyOffset(offset) {
  const v1 = document.getElementById("video1");
  const v2 = document.getElementById("video2");

  v1.pause();
  v2.pause();

  v1.currentTime = 0;
  v2.currentTime = 0;

  if (offset > 0) {
    v2.currentTime = offset;
  } else {
    v1.currentTime = -offset;
  }

  lastOffset = offset;

  Promise.all([v1.play(), v2.play()]);
}

// ================= UI =================

async function autoSync() {
  const file1 = document.getElementById("v1").files[0];
  const file2 = document.getElementById("v2").files[0];

  loadVideos(file1, file2);

  const offset = await calculateOffset(file1, file2);

  console.log("Offset automático:", offset);

  document.getElementById("manualOffset").value = offset.toFixed(2);

  applyOffset(offset);
}

function applyManual() {
  const offset = parseFloat(
    document.getElementById("manualOffset").value
  );

  applyOffset(offset);
}

// ================= DRIFT CORRECTION =================

setInterval(() => {
  const v1 = document.getElementById("video1");
  const v2 = document.getElementById("video2");

  if (!v1.paused && !v2.paused) {
    const diff = v1.currentTime - v2.currentTime;

    if (Math.abs(diff) > 0.1) {
      v2.currentTime += diff;
    }
  }
}, 500);

</script>

</body>
</html>
