<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Indaband Primeira Parte - Com Controle de Ganho</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 50px;
}

video {
  width: 300px;
  height: 533px; /* 9:16 */
  background: black;
  object-fit: cover;
  margin-top: 20px;
}

.controls {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
}

.volume-container {
  background: #222;
  padding: 10px 20px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}

button {
  padding: 10px 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>Gravação em formato Shorts (9:16)</h2>

<video id="preview" autoplay playsinline muted></video>

<div class="controls">
  <div class="volume-container">
    <label for="gainInput">🎤 Volume Mic:</label>
    <input type="range" id="gainInput" min="0" max="3" step="0.1" value="1">
    <span id="gainValue">1.0x</span>
  </div>

  <div>
    <button onclick="start()">▶ Start</button>
    <button onclick="stop()">⏹ Stop</button>
  </div>
</div>

<div id="output"></div>

<script>
let stream;
let recorder;
let chunks = [];
let canvasStream;
let audioCtx;
let gainNode;

// Atualiza o texto do volume na tela
document.getElementById('gainInput').addEventListener('input', (e) => {
  const val = e.target.value;
  document.getElementById('gainValue').innerText = val + "x";
  if (gainNode) {
    gainNode.gain.setTargetAtTime(val, audioCtx.currentTime, 0.01);
  }
});

async function start() {
  chunks = [];
  document.getElementById("output").innerHTML = "";

  // 1. Captura vídeo e áudio originais
  stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  const video = document.getElementById("preview");
  video.srcObject = stream;

  // --- LÓGICA DE ÁUDIO (CONTROLE DE VOLUME) ---
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaStreamSource(stream);
  gainNode = audioCtx.createGain();
  
  // Define o ganho inicial baseado no slider
  gainNode.gain.value = document.getElementById('gainInput').value;
  
  // Criamos um destino para o áudio processado
  const audioDestination = audioCtx.createMediaStreamDestination();
  source.connect(gainNode);
  gainNode.connect(audioDestination);
  // --------------------------------------------

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = 1080;
  canvas.height = 1920;

  function draw() {
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    if (!vw || !vh) { requestAnimationFrame(draw); return; }

    const canvasRatio = canvas.width / canvas.height;
    const videoRatio = vw / vh;
    let sx, sy, sw, sh;

    if (videoRatio > canvasRatio) {
      sh = vh; sw = vh * canvasRatio; sx = (vw - sw) / 2; sy = 0;
    } else {
      sw = vw; sh = vw / canvasRatio; sx = 0; sy = (vh - sh) / 2;
    }

    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
    requestAnimationFrame(draw);
  }

  video.onloadedmetadata = () => draw();

  // Stream do Canvas (Vídeo)
  canvasStream = canvas.captureStream(30);

  // 🔥 ADICIONA O ÁUDIO PROCESSADO (com volume) em vez do áudio bruto
  audioDestination.stream.getAudioTracks().forEach(track => {
    canvasStream.addTrack(track);
  });

  recorder = new MediaRecorder(canvasStream);
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    const url = URL.createObjectURL(blob);
    const playback = document.createElement("video");
    playback.src = url;
    playback.controls = true;
    playback.autoplay = true;
    playback.style.width = "300px";
    playback.style.height = "533px";
    playback.style.marginTop = "20px";
    const output = document.getElementById("output");
    output.innerHTML = "<h3>Resultado Gravado:</h3>";
    output.appendChild(playback);
  };

  recorder.start();
}

function stop() {
  if (recorder && recorder.state !== "inactive") {
    recorder.stop();
  }
  stream?.getTracks().forEach(t => t.stop());
  if(audioCtx) audioCtx.close();
}
</script>

</body>
</html>
