<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Camera Sync Record</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.wrapper {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* LADO A LADO */
.videos {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 0;
}

.player {
  position: relative;
}

video {
  width: 45vw;
  max-height: 70vh;
  object-fit: contain;
  background: black;
  display: block;
}

/* CONTROLES */
.controls {
  margin-top: 50px;
  display: flex;
  gap: 10px;
}

button {
  padding: 10px 18px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="videos">

    <!-- CAMERA -->
    <div class="player">
      <video id="cam" autoplay playsinline muted></video>
    </div>

    <!-- VIDEO 2 -->
    <div class="player">
      <video id="v2" src="video2.mp4" preload="auto" loop></video>
    </div>

  </div>

  <div class="controls">
    <button onclick="startRecord()">🎥 Gravar</button>
    <button onclick="stopRecord()">⏹ Parar</button>
  </div>

</div>

<script>
const cam = document.getElementById("cam");
const v2 = document.getElementById("v2");

let recorder;
let recordedChunks = [];

/* 🎥 ativa câmera */
async function initCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  cam.srcObject = stream;
  return stream;
}

/* 🎬 inicia sincronizado */
async function startRecord() {

  recordedChunks = [];

  const stream = await initCamera();

  // prepara gravação APENAS da câmera
  recorder = new MediaRecorder(stream);

  recorder.ondataavailable = e => {
    if (e.data.size > 0) recordedChunks.push(e.data);
  };

  recorder.onstop = () => {
    const blob = new Blob(recordedChunks, { type: "video/webm" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "camera.webm";
    a.click();
  };

  // 🔥 sincronização exata de início
  v2.currentTime = 0;

  await v2.play();
  recorder.start();

}

/* ⏹ parar tudo */
function stopRecord() {
  if (recorder && recorder.state !== "inactive") {
    recorder.stop();
  }

  cam.srcObject?.getTracks().forEach(t => t.stop());
  v2.pause();
}
</script>

</body>
</html>
