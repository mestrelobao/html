<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Vídeos colados</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
}

/* ÁREA TOTAL */
.videos {
  position: relative;
  width: 100vw;
  height: 80vh;
}

/* ESQUERDA */
.player.left {
  position: absolute;
  top: 0;
  left: 0;
  width: 50vw;
  height: 100%;
  overflow: hidden;
}

/* DIREITA */
.player.right {
  position: absolute;
  top: 0;
  left: 50vw;
  width: 50vw;
  height: 100%;
  overflow: hidden;
}

/* VÍDEO OCUPA TUDO */
video {
  width: 100%;
  height: 100%;
  display: block;
object-fit: cover;
  background: black;
}

/* VOLUME ABAIXO DO VÍDEO */
.volume {
  position: absolute;
  bottom: 5px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 12px;
}

.volume input {
  width: 80%;
}

/* CONTROLES */
.controls {
  height: 20vh;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  background: #111;
}

button {
  padding: 10px 18px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="videos">

  <div class="player left">
    <video id="v1" src="video1.mp4" preload="auto"></video>
    <div class="volume">
      Volume 1<br>
      <input type="range" min="0" max="1" step="0.01"
             value="1" oninput="v1.volume = this.value">
    </div>
  </div>

  <div class="player right">
    <video id="v2" src="video2.mp4" preload="auto"></video>
    <div class="volume">
      Volume 2<br>
      <input type="range" min="0" max="1" step="0.01"
             value="1" oninput="v2.volume = this.value">
    </div>
  </div>

</div>

<div class="controls">
  <button onclick="startSync()">▶️ Iniciar</button>
  <button onclick="stopSync()">⏸️ Parar</button>
</div>

<script>
const v1 = document.getElementById("v1");
const v2 = document.getElementById("v2");

let syncInterval = null;

function waitReady(video) {
  return new Promise(resolve => {
    if (video.readyState >= 3) return resolve();
    video.addEventListener("canplaythrough", resolve, { once: true });
  });
}

function resetVideos() {
  [v1, v2].forEach(v => {
    v.pause();
    v.currentTime = 0;
  });
}

async function startSync() {
  stopSync();
  resetVideos();

  await Promise.all([waitReady(v1), waitReady(v2)]);

  await Promise.all([v1.play(), v2.play()]);

  syncInterval = setInterval(() => {
    const diff = v1.currentTime - v2.currentTime;

    if (Math.abs(diff) > 0.03) {
      v2.currentTime = v1.currentTime;
    }
  }, 50);
}

function stopSync() {
  v1.pause();
  v2.pause();

  if (syncInterval) {
    clearInterval(syncInterval);
    syncInterval = null;
  }
}

[v1, v2].forEach(v => {
  v.addEventListener("ended", () => {
    v.pause();
    v.currentTime = 0;
  });
});
</script>

</body>
</html>
