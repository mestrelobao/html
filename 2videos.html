<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Synced Loop Videos</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

.wrapper {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* VIDEOS CENTERED */
.videos {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 0;
}

.player {
  position: relative;
}

/* NO CROPPING */
video {
  width: 45vw;
  max-height: 70vh;
  object-fit: contain;
  background: black;
  display: block;
}

/* VOLUME */
.volume {
  position: absolute;
  bottom: -40px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 12px;
}

.volume input {
  width: 80%;
}

/* CONTROLS */
.controls {
  margin-top: 60px;
  display: flex;
  gap: 10px;
}

button {
  padding: 10px 18px;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="videos">

    <div class="player">
      <video id="v1" src="video1.mp4" preload="auto" loop></video>
      <div class="volume">
        Volume 1<br>
        <input type="range" min="0" max="1" step="0.01"
               value="1" oninput="v1.volume = this.value">
      </div>
    </div>

    <div class="player">
      <video id="v2" src="video2.mp4" preload="auto" loop></video>
      <div class="volume">
        Volume 2<br>
        <input type="range" min="0" max="1" step="0.01"
               value="1" oninput="v2.volume = this.value">
      </div>
    </div>

  </div>

  <div class="controls">
    <button onclick="startSync()">▶ Start</button>
    <button onclick="stopSync()">⏸ Stop</button>
  </div>

</div>

<script>
const v1 = document.getElementById("v1");
const v2 = document.getElementById("v2");

let syncInterval = null;

function waitReady(video) {
  return new Promise(resolve => {
    if (video.readyState >= 3) return resolve();
    video.addEventListener("canplaythrough", resolve, { once: true });
  });
}

function resetVideos() {
  [v1, v2].forEach(v => {
    v.pause();
    v.currentTime = 0;
  });
}

async function startSync() {
  stopSync();
  resetVideos();

  await Promise.all([waitReady(v1), waitReady(v2)]);

  await Promise.all([v1.play(), v2.play()]);

  syncInterval = setInterval(() => {
    const diff = v1.currentTime - v2.currentTime;

    if (Math.abs(diff) > 0.03) {
      v2.currentTime = v1.currentTime;
    }

    // 🔥 EXTRA SAFETY: keep loop aligned
    if (v1.ended || v2.ended) {
      v1.currentTime = 0;
      v2.currentTime = 0;
      v1.play();
      v2.play();
    }

  }, 50);
}

function stopSync() {
  v1.pause();
  v2.pause();

  if (syncInterval) {
    clearInterval(syncInterval);
    syncInterval = null;
  }
}
</script>

</body>
</html>
