<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Vídeos sincronizados</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  font-family: Arial, sans-serif;
}

/* LADO A LADO OCUPANDO A TELA TODA */
.videos {
  display: flex;
  width: 100vw;
  height: 100vh;
}

.player {
  flex: 1;
  display: flex;
  flex-direction: column;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain; /* não corta o vídeo */
  background: black;
}

/* CONTROLES */
.controls {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  padding: 10px;
  border-radius: 8px;
}

button {
  padding: 10px 16px;
  margin: 0 5px;
  cursor: pointer;
}

/* VOLUME */
.volume {
  position: absolute;
  bottom: 60px;
  width: 50%;
  text-align: center;
  color: white;
  font-size: 12px;
}

.player:nth-child(1) .volume {
  left: 0;
}

.player:nth-child(2) .volume {
  right: 0;
}
</style>
</head>

<body>

<div class="videos">

  <div class="player">
    <video id="v1" src="video1.mp4" preload="auto"></video>
    <div class="volume">
      Volume 1<br>
      <input type="range" min="0" max="1" step="0.01" value="1"
             oninput="v1.volume = this.value">
    </div>
  </div>

  <div class="player">
    <video id="v2" src="video2.mp4" preload="auto"></video>
    <div class="volume">
      Volume 2<br>
      <input type="range" min="0" max="1" step="0.01" value="1"
             oninput="v2.volume = this.value">
    </div>
  </div>

</div>

<div class="controls">
  <button onclick="startSync()">▶️ Iniciar</button>
  <button onclick="stopSync()">⏸️ Parar</button>
</div>

<script>
const v1 = document.getElementById("v1");
const v2 = document.getElementById("v2");

let syncInterval = null;

// espera carregar
function waitReady(video) {
  return new Promise(resolve => {
    if (video.readyState >= 3) return resolve();
    video.addEventListener("canplaythrough", resolve, { once: true });
  });
}

// reset
function resetVideos() {
  [v1, v2].forEach(v => {
    v.pause();
    v.currentTime = 0;
  });
}

// iniciar sincronizado
async function startSync() {
  stopSync();
  resetVideos();

  await Promise.all([waitReady(v1), waitReady(v2)]);

  try {
    await Promise.all([v1.play(), v2.play()]);
  } catch (err) {
    console.log(err);
    return;
  }

  syncInterval = setInterval(() => {
    const diff = v1.currentTime - v2.currentTime;

    if (Math.abs(diff) > 0.03) {
      v2.currentTime = v1.currentTime;
    }
  }, 50);
}

// parar
function stopSync() {
  v1.pause();
  v2.pause();

  if (syncInterval) {
    clearInterval(syncInterval);
    syncInterval = null;
  }
}

// reset ao terminar
[v1, v2].forEach(v => {
  v.addEventListener("ended", () => {
    v.pause();
    v.currentTime = 0;
  });
});
</script>

</body>
</html>
