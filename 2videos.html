<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Vídeos sincronizados</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      gap: 10px;
      background: #111;
    }
    video {
      width: 45%;
      background: black;
    }
    button {
      position: fixed;
      bottom: 20px;
      padding: 10px 20px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<video id="v1" src="video1.mp4" preload="auto" muted></video>
<video id="v2" src="video2.mp4" preload="auto" muted></video>

<button onclick="startSync()">▶️ Iniciar</button>

<script>
const v1 = document.getElementById('v1');
const v2 = document.getElementById('v2');

function waitReady(video) {
  return new Promise(resolve => {
    if (video.readyState >= 3) {
      resolve();
    } else {
      video.addEventListener('canplaythrough', resolve, { once: true });
    }
  });
}

async function startSync() {
  // Espera os dois carregarem bem
  await Promise.all([waitReady(v1), waitReady(v2)]);

  // Reseta tempo
  v1.currentTime = 0;
  v2.currentTime = 0;

  // Toca juntos
  await Promise.all([v1.play(), v2.play()]);

  // Corrige drift continuamente
  setInterval(() => {
    const diff = v1.currentTime - v2.currentTime;

    if (Math.abs(diff) > 0.03) {
      v2.currentTime = v1.currentTime;
    }
  }, 50);
}
</script>

</body>
</html>
