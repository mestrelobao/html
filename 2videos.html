<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sincronização com Volume Individual</title>

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
    }

    .videos {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      width: 100%;
      justify-content: center;
    }

    .player {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 45%;
    }

    video {
      width: 100%;
      background: black;
    }

    .controls {
      margin: 20px;
    }

    button {
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
      margin: 0 5px;
    }

    .volume {
      margin-top: 8px;
      width: 100%;
    }

    .volume label {
      font-size: 12px;
      display: block;
      margin-bottom: 4px;
      text-align: center;
    }

    input[type="range"] {
      width: 100%;
    }
  </style>
</head>

<body>

<div class="videos">

  <div class="player">
    <video id="v1" src="video1.mp4" preload="auto"></video>
    <div class="volume">
      <label>Volume Vídeo 1</label>
      <input type="range" min="0" max="1" step="0.01" value="1"
             oninput="v1.volume = this.value">
    </div>
  </div>

  <div class="player">
    <video id="v2" src="video2.mp4" preload="auto"></video>
    <div class="volume">
      <label>Volume Vídeo 2</label>
      <input type="range" min="0" max="1" step="0.01" value="1"
             oninput="v2.volume = this.value">
    </div>
  </div>

</div>

<div class="controls">
  <button onclick="startSync()">▶️ Iniciar</button>
  <button onclick="stopSync()">⏸️ Parar</button>
</div>

<script>
const v1 = document.getElementById("v1");
const v2 = document.getElementById("v2");

let syncInterval = null;

function waitReady(video) {
  return new Promise(resolve => {
    if (video.readyState >= 3) return resolve();
    video.addEventListener("canplaythrough", resolve, { once: true });
  });
}

function resetVideos() {
  [v1, v2].forEach(v => {
    v.pause();
    v.currentTime = 0;
  });
}

async function startSync() {
  stopSync();
  resetVideos();

  await Promise.all([waitReady(v1), waitReady(v2)]);

  try {
    await Promise.all([v1.play(), v2.play()]);
  } catch (err) {
    console.log("Erro ao reproduzir:", err);
    return;
  }

  syncInterval = setInterval(() => {
    const diff = v1.currentTime - v2.currentTime;

    if (Math.abs(diff) > 0.03) {
      v2.currentTime = v1.currentTime;
    }
  }, 50);
}

function stopSync() {
  v1.pause();
  v2.pause();

  if (syncInterval) {
    clearInterval(syncInterval);
    syncInterval = null;
  }
}

[v1, v2].forEach(v => {
  v.addEventListener("ended", () => {
    v.pause();
    v.currentTime = 0;
  });
});
</script>

</body>
</html>
