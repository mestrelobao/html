<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sincronizar os Dois Videos</title>

<style>
  a {
  color: hotpink;
  background-color: yellow;
  font-weight: bold;
}
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.row {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

video {
  width: 300px;
  height: 533px;
  background: black;
  object-fit: cover;
}

.controls {
  margin-top: 15px;
}

button {
  padding: 10px 16px;
  margin: 5px;
}

input {
  width: 80px;
}
</style>
</head>

<body>

<h2>Sincronizar os Dois Videos</h2>

<input type="file" id="fileInput" accept="video/*" style="width: 300px;">

<div class="controls">
  <button onclick="start()">▶ Gravar</button>
  <button onclick="stop()">⏹ Parar</button>
</div>

<div class="row">
  <video id="guide" controls></video>
  <video id="recorded" controls></video>
</div>

<!-- 🎚 OFFSETS -->
<div class="controls">
  Guide Offset:
  <input type="number" id="offsetGuide" step="0.1" value="0">

  Recorded Offset:
  <input type="number" id="offsetRecorded" step="0.1" value="0">
</div>

<div class="controls">
  <button onclick="playMaster()">▶ Play</button>
  <button onclick="pauseMaster()">⏸ Pause</button>
</div>
  <br>
<a href="https://cloudconvert.com/">Converter .webm to .mp4</a>
<script>
let stream;
let recorder;
let chunks = [];

const guide = document.getElementById("guide");
const recorded = document.getElementById("recorded");

// carregar vídeo
document.getElementById("fileInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;
  guide.src = URL.createObjectURL(file);
});

// 🎥 gravação
async function start() {
  chunks = [];

  const offsetGuide = parseFloat(document.getElementById("offsetGuide").value) || 0;

  stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  recorder = new MediaRecorder(stream);

  recorder.ondataavailable = e => {
    if (e.data.size > 0) chunks.push(e.data);
  };

  recorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    recorded.src = URL.createObjectURL(blob);
  };

  // ▶ inicia ambos "alinhados"
  guide.currentTime = Math.max(0, offsetGuide);
  guide.play().catch(() => {});

  recorder.start();
}

// ⏹ parar
function stop() {
  recorder?.stop();
  stream?.getTracks().forEach(t => t.stop());
  guide.pause();
}

// ▶ PLAY COM DOIS OFFSETS
function playMaster() {
  const offsetGuide = parseFloat(document.getElementById("offsetGuide").value) || 0;
  const offsetRecorded = parseFloat(document.getElementById("offsetRecorded").value) || 0;

  guide.currentTime = Math.max(0, offsetGuide);
  recorded.currentTime = Math.max(0, offsetRecorded);

  guide.play().catch(() => {});
  recorded.play().catch(() => {});
}

// ⏸ pause
function pauseMaster() {
  guide.pause();
  recorded.pause();
}
</script>

</body>
</html>
